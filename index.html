<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Just the Weather</title>
  <meta name="description" content="Just the weather. No ads, no tracking.">

  <!-- PWA install meta -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#047857">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
  <link rel="icon" type="image/svg+xml" href="/icons/favicon.svg">

  <!-- FOUC prevention: apply theme BEFORE CSS loads. This duplicates theme.js's
       valid-theme rule by hand because it must run before modules load; keep it
       in sync with THEME_STATES in theme.js. -->
  <script>
    (function() {
      const saved = localStorage.getItem('theme');
      if (saved && saved !== 'system') {
        document.documentElement.setAttribute('data-theme', saved);
      }
    })();
  </script>

  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <header>
    <h1>Just the Weather</h1>
    <div class="settings">
      <button id="settings-toggle" aria-label="Settings" aria-haspopup="dialog"
              aria-expanded="false" aria-controls="settings-menu">
        <span aria-hidden="true">⚙</span>
      </button>

      <div id="settings-menu" aria-label="Settings" hidden>
        <fieldset class="settings-group">
          <legend>Theme</legend>
          <div class="theme-options" role="radiogroup" aria-label="Theme">
            <label><input type="radio" name="theme" value="system"><span><span class="theme-icon" aria-hidden="true"></span>System</span></label>
            <label><input type="radio" name="theme" value="light"><span><span class="theme-icon" aria-hidden="true"></span>Light</span></label>
            <label><input type="radio" name="theme" value="dark"><span><span class="theme-icon" aria-hidden="true"></span>Dark</span></label>
          </div>
        </fieldset>

        <label id="notify-toggle" class="settings-group" hidden>
          <input type="checkbox" id="notify-checkbox" disabled>
          <span>Notify me about weather alerts</span>
        </label>
      </div>
    </div>
  </header>

  <main>
    <section id="alerts" aria-live="assertive" aria-label="Active weather alerts" hidden></section>

    <section id="current" aria-live="polite">
      <p class="loading">Loading…</p>
    </section>

    <section id="forecast">
      <ol id="today-list" class="forecast-list"></ol>
      <h2>Extended Forecast</h2>
      <ol id="forecast-list" class="forecast-list"></ol>
    </section>

    <p id="status" hidden></p>
  </main>

  <footer>
    <p>Part of the <a href="https://keepitneat.app">Keep It Neat</a> series.</p>
    <p>No ads. No tracking. <a href="https://github.com/keepitneat/weather">Source on GitHub</a>.</p>
    <p>If this is useful, you can <a href="https://ko-fi.com/keepitneat">buy me a coffee</a>.</p>
  </footer>

  <script type="module" src="/app.js"></script>
</body>
</html>
