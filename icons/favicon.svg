<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Sun. Brand green on transparent. Just the sun, no wordmark. -->
  <circle cx="256" cy="256" r="80" fill="#047857"/>
  <g stroke="#047857" stroke-width="28" stroke-linecap="round">
    <!-- Cardinal rays -->
    <line x1="256" y1="96" x2="256" y2="156"/>
    <line x1="256" y1="356" x2="256" y2="416"/>
    <line x1="96" y1="256" x2="156" y2="256"/>
    <line x1="356" y1="256" x2="416" y2="256"/>
    <!-- Diagonal rays -->
    <line x1="143" y1="143" x2="185" y2="185"/>
    <line x1="327" y1="327" x2="369" y2="369"/>
    <line x1="143" y1="369" x2="185" y2="327"/>
    <line x1="327" y1="185" x2="369" y2="143"/>
  </g>
</svg>
