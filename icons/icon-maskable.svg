<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Maskable variant: green background, white sun + white wordmark.
       Design kept within the inner 80% safe zone for Android masking. -->

  <rect width="512" height="512" fill="#047857"/>

  <!-- Sun -->
  <circle cx="256" cy="200" r="40" fill="#ffffff"/>
  <g stroke="#ffffff" stroke-width="15" stroke-linecap="round">
    <line x1="256" y1="120" x2="256" y2="142"/>
    <line x1="256" y1="258" x2="256" y2="280"/>
    <line x1="176" y1="200" x2="198" y2="200"/>
    <line x1="314" y1="200" x2="336" y2="200"/>
    <line x1="200" y1="144" x2="216" y2="160"/>
    <line x1="312" y1="144" x2="296" y2="160"/>
    <line x1="200" y1="256" x2="216" y2="240"/>
    <line x1="312" y1="256" x2="296" y2="240"/>
  </g>

  <!-- NEAT wordmark -->
  <text x="256" y="400"
        text-anchor="middle"
        font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
        font-weight="800"
        font-size="110"
        letter-spacing="5"
        fill="#ffffff">NEAT</text>
</svg>
