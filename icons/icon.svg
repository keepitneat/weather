<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Sun + NEAT wordmark. Brand green on transparent.
       For favicon + 'any' purpose PNGs. -->

  <!-- Sun (upper half) -->
  <circle cx="256" cy="180" r="48" fill="#047857"/>
  <g stroke="#047857" stroke-width="18" stroke-linecap="round">
    <line x1="256" y1="80" x2="256" y2="108"/>
    <line x1="256" y1="252" x2="256" y2="280"/>
    <line x1="156" y1="180" x2="184" y2="180"/>
    <line x1="328" y1="180" x2="356" y2="180"/>
    <line x1="186" y1="110" x2="206" y2="130"/>
    <line x1="326" y1="110" x2="306" y2="130"/>
    <line x1="186" y1="250" x2="206" y2="230"/>
    <line x1="326" y1="250" x2="306" y2="230"/>
  </g>

  <!-- NEAT wordmark (lower half) -->
  <text x="256" y="430"
        text-anchor="middle"
        font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
        font-weight="800"
        font-size="140"
        letter-spacing="6"
        fill="#047857">NEAT</text>
</svg>
